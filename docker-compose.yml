name: planta-de-gaseosas

networks:
  planta_net:
    driver: bridge

volumes:
  minio_data:
  influxdb_data:
  grafana_data:
  mosquitto_data:

services:

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: planta-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
    networks: [planta_net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -t '$$SYS/broker/uptime' -C 1 -W 3 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio:latest
    container_name: planta-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks: [planta_net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  createbuckets:
    image: quay.io/minio/mc:latest
    container_name: planta-createbuckets
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      INFLUXDB3_BUCKET: ${INFLUXDB3_BUCKET:-influxdb3}
    entrypoint: >
      /bin/sh -c "
      set -e;
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing local/$$INFLUXDB3_BUCKET;
      mc anonymous set none local/$$INFLUXDB3_BUCKET;
      echo 'bucket ready: '$$INFLUXDB3_BUCKET;
      exit 0;
      "
    restart: on-failure
    networks: [planta_net]

  influxdb:
    image: influxdb:3-core
    container_name: planta-influxdb
    command:
      - influxdb3
      - serve
      - --node-id=node0
      - --object-store=s3
      - --bucket=${INFLUXDB3_BUCKET:-influxdb3}
      - --aws-endpoint=http://minio:9000
      - --aws-access-key-id=${MINIO_ROOT_USER}
      - --aws-secret-access-key=${MINIO_ROOT_PASSWORD}
      - --aws-allow-http
      - --without-auth
      - --http-bind=0.0.0.0:8181
    environment:
      INFLUXDB3_OBJECT_STORE: s3
      INFLUXDB3_BUCKET: ${INFLUXDB3_BUCKET:-influxdb3}
      AWS_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_ALLOW_HTTP: "true"
      AWS_REGION: us-east-1
    ports:
      - "8181:8181"
    volumes:
      - influxdb_data:/var/lib/influxdb3
    depends_on:
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    networks: [planta_net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8181/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  telegraf:
    image: telegraf:1.30
    container_name: planta-telegraf
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    depends_on:
      mosquitto:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    networks: [planta_net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep telegraf || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  grafana:
    image: grafana/grafana:11.2.0
    container_name: planta-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      INFLUXDB3_TOKEN: ${INFLUXDB3_TOKEN}
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      influxdb:
        condition: service_healthy
    networks: [planta_net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  simulator:
    build:
      context: ./simulator
    container_name: planta-simulator
    environment:
      MQTT_BROKER: ${MQTT_BROKER:-mosquitto}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_TOPIC_PREFIX: ${MQTT_TOPIC_PREFIX:-planta1}
    depends_on:
      mosquitto:
        condition: service_healthy
    networks: [planta_net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f sensores.py || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
